<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">TP3</title>
    <!-- Simple CSS via CDN for styling without too much effort -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#" th:text="#{event.title}">Student Events</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" th:if="${session.loggedUser == null}">
                        <a class="nav-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser == null}">
                        <a class="nav-link" th:href="@{/register}" th:text="#{nav.register}">Register</a>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser != null}">
                        <a class="nav-link" th:href="@{/events}" th:text="#{nav.events}">Events</a>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser != null}">
                        <a class="nav-link" th:href="@{/profile}" th:text="#{nav.profile}">Profile</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown" th:if="${session.loggedUser != null}">
                        <span class="navbar-text me-3" th:text="#{nav.welcome} + ' ' + ${session.loggedUser.name}">User</span>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser != null}">
                        <a class="nav-link text-danger" th:href="@{/logout}" th:text="#{nav.logout}">Logout</a>
                    </li>
                    
                    <!-- Language selector -->
                    <li class="nav-item ms-3">
                        <a class="nav-link" th:href="@{${#httpServletRequest.requestURI}(lang='fr')}">🇫🇷 <span th:text="#{nav.lang.fr}">FR</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{${#httpServletRequest.requestURI}(lang='en')}">🇬🇧 <span th:text="#{nav.lang.en}">EN</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{${#httpServletRequest.requestURI}(lang='ar')}">🇲🇦 <span th:text="#{nav.lang.ar}">AR</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
