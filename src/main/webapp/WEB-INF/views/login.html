<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{login.title})}"></head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 th:text="#{login.title}">Login</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${param.registered}" class="alert alert-success" th:text="#{login.registered}"></div>
                        <div th:if="${param.logout}" class="alert alert-info" th:text="#{login.logout}"></div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label" th:text="#{login.email}">Email</label>
                                <input type="email" name="email" class="form-control" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label" th:text="#{login.password}">Password</label>
                                <input type="password" name="password" class="form-control" required />
                            </div>
                            <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
